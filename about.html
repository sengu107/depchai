<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/about.css">
    <title>About Me</title>
    <style>
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 16px;
        }
        .content-wrapper {
            display: flex;
            gap: 24px;
        }
        .profile-gif-panel,
        .info-section {
            flex: 1;
        }
        .profile-gif {
            width: 100%;
            max-width: 220px;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .info-section {
            min-width: 180px;
        }
        .profile-section {
            margin-top: 32px;
            text-align: center;
        }
        @media (max-width: 900px) {
            .container {
                max-width: 100%;
                padding: 16px 8px;
            }
            .content-wrapper {
                gap: 12px;
            }
        }
        @media (max-width: 700px) {
            .content-wrapper {
                flex-direction: column;
                align-items: center;
                gap: 18px;
            }
            .profile-gif-panel,
            .info-section {
                width: 100%;
                max-width: 400px;
            }
            .profile-section {
                margin-top: 24px;
            }
        }
        @media (max-width: 480px) {
            .container {
                padding: 8px 2vw;
            }
            .profile-gif {
                max-width: 120px;
            }
            .info-section {
                font-size: 0.95rem;
                padding: 8px;
            }
            .profile-section {
                margin-top: 16px;
            }
            .title-wrapper .title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="device.html">Device</a></li>
                <li><a href="social-media.html">Social Media</a></li>
            </ul>
        </nav>
    </header>

    <img src="src/assets/image/background2.gif" alt="Background GIF" class="background">

    <main class="main-content">
        <div class="container">
            <div class="content-wrapper">
                <div class="profile-gif-panel glass-panel">
                    <img src="src/assets/image/gif1.gif" alt="gif1" class="profile-gif">
                </div>
                <div class="info-section glass-panel">
                    <h3>Personal Information</h3>
                    <ul class="info-list">
                        <li><b>Fullname:</b> Hoàng Kim Sang</li>
                        <li><b>Birthday:</b> 10/07</li>
                        <li><b>Birthplace:</b> Ha Noi</li>
                        <li><b>Hobby:</b> playing hoyogame, taking photo, and build pc</li>
                    </ul>
                </div>
            </div>
            <div class="profile-section">
                <div class="title-wrapper">
                    <h2 id="typing-about" class="title"></h2>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
