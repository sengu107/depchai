<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Image Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }
        body {
            padding-top: 60px;
            text-align: center;
            background: #f5f5f5;
        }
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: transparent;
            display: flex;
            justify-content: center;
            padding: 15px 0;
            transition: color 0.3s;
            z-index: 1000;
        }
        .navbar a {
            color: black;
            text-decoration: none;
            padding: 14px 20px;
            font-size: 18px;
            font-weight: 600;
            transition: color 0.3s;
        }
        .navbar a:hover {
            color: #cc8e08;
        }
        .container {
            margin-top: 100px;
        }
        .upload-btn {
            background: #cc8e08;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }
        .upload-btn:hover {
            background: #b37a06;
        }
        #imageContainer {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(18%, 1fr));
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            padding: 10px;
        }
        .image-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            position: relative;
        }
        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="aboutme.html">About Me</a>
        <a href="contact.html">Contact</a>
        <a href="images.html">Image Collection</a>
    </div>
    <div class="container">
        <h2>Upload and View Images</h2>
        <input type="file" id="imageUpload" accept="image/*" hidden>
        <button class="upload-btn" onclick="document.getElementById('imageUpload').click()">Post Image</button>
        <div id="imageContainer"></div>
    </div>
    <script>
        document.getElementById('imageUpload').addEventListener('change', function(event) {
            var file = event.target.files[0];
            if (file) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    var imgContainer = document.getElementById('imageContainer');
                    var imgDiv = document.createElement('div');
                    imgDiv.classList.add('image-box');
                    imgDiv.innerHTML = `<img src="${e.target.result}" alt="Uploaded Image">`;
                    imgContainer.prepend(imgDiv);
                }
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
