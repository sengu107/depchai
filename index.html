<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Biography</title>
    <link rel="stylesheet" href="styles/main.css">
    <style>
        *:hover {
            color: #da7604 !important;
            transition: color 0.15s;
        }
    </style>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0; overflow: hidden;">
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="social-media.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <img src="/src/assets/image/background1.gif" 
         alt="Background GIF" 
         style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 0; pointer-events: none; opacity: 0.4; filter: blur(6px);">
    <main style="position: relative; flex: 1 0 auto; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh;">
        <h2 style="text-align: center; margin-bottom: 32px;">
            Welcome to my 
            <span style="position: relative; display: inline-block;">
                <img src="/src/assets/image/senko.png"
                     alt="Senko-san"
                     style="position: absolute; left: 100%; top: 0%; width: 40%; height: auto; transform: translate(-50%,-50%) rotate(20deg); z-index: 1; opacity: 1; pointer-events: none;">
                <span style="position: relative; z-index: 2; background: transparent; color: #e6ab0a; font-weight: bold;">profile</span>
            </span>
            !
        </h2>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 18px;">
            <div id="date-container" style="text-align: center;">
                <div id="gregorian-date" style="font-family: 'Roboto Mono', monospace; font-size: 0.75em; color: #222;">
                    --
                </div>
            </div>
            <div id="pixel-clock" style="text-align: center;">
                <div id="clock" style="font-family: 'Roboto Mono', monospace; font-size: 1.25em; color: #222; letter-spacing: 0.05em; background: #fff; border-radius: 16px; display: inline-block; padding: 6px 14px;">
                    00:00:00
                </div>
            </div>
        </div>
    </main>
    <footer style="position: relative; z-index: 1; flex-shrink: 0; text-align: center; background: transparent;">
        <p>&copy;<span id="year"></span>senchan</p>
    </footer>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
    <script src="/src/scripts/main.js"></script>
</body>
</html>
